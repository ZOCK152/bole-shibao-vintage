{% extends "base.html" %}

{% block title %}客服与售后 | 伯乐拾宝vintage{% endblock %}

{% block content %}
  <section class="shell section">
    <div class="page-head">
      <p class="eyebrow">Service</p>
      <h1>客服与售后</h1>
      <p>请在下单前确认尺码、成色与细节需求。</p>
    </div>

    <div class="stack-card service-list">
      <div class="service-item">
        <h2>咨询时间</h2>
        <p>7:30 - 21:30</p>
      </div>
      <div class="service-item">
        <h2>发货时间</h2>
        <p>24小时内</p>
      </div>
      <div class="service-item">
        <h2>售后原则</h2>
        <p>原则上不退不换。</p>
      </div>
      <div class="service-item">
        <h2>可退情况</h2>
        <p>货不对版、发错、拍错。</p>
      </div>
      <div class="service-item">
        <h2>运费说明</h2>
        <p>属于可退情况的运费由商家承担。</p>
      </div>
    </div>
  </section>
{% endblock %}
